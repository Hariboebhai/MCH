<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Matrix Car Hire — Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0C0E;
    --surface:#17181B;
    --surface-2:#1F2124;
    --border:#2B2D31;
    --text:#F3F2EF;
    --text-dim:#96999E;
    --accent:#E3342E;
    --accent-dim:#4A1917;
    --positive:#3FA37E;
    --positive-dim:#1B2E27;
    --negative:#E8735F;
    --negative-dim:#3A231F;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    background:var(--bg);
  }
  .topbar{
    padding:16px 18px 12px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    background:var(--bg);
    z-index:10;
  }
  .topbar img.logo{
    display:block;
    height:34px;
    width:auto;
    margin-bottom:10px;
  }
  .topbar h1{
    margin:0;
    font-size:19px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  main{
    flex:1;
    padding:16px 16px 100px;
    overflow-y:auto;
  }
  /* Month switcher */
  .month-switch{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  .month-switch button{
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    width:36px;height:36px;
    border-radius:9px;
    font-size:16px;
    cursor:pointer;
  }
  .month-switch button:active{background:var(--surface-2);}
  .month-label{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:15px;
    letter-spacing:.02em;
  }
  /* Trip computer readout */
  .readout{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 18px;
    margin-bottom:14px;
  }
  .readout .net-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .readout .net-value{
    font-family:'JetBrains Mono',monospace;
    font-size:38px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    letter-spacing:-0.01em;
    line-height:1;
  }
  .readout .net-value.pos{color:var(--positive);}
  .readout .net-value.neg{color:var(--negative);}
  .readout-split{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .readout-split .cell{
    flex:1;
    background:var(--surface-2);
    border-radius:9px;
    padding:10px 12px;
  }
  .readout-split .cell .lbl{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--text-dim);
    margin-bottom:4px;
  }
  .readout-split .cell .val{
    font-family:'JetBrains Mono',monospace;
    font-size:17px;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .readout-split .cell.earn .val{color:var(--positive);}
  .readout-split .cell.exp .val{color:var(--negative);}

  .section-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:var(--text-dim);
    margin:22px 0 10px;
    font-weight:600;
  }
  /* Per-vehicle cards */
  .vehicle-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:9px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .vehicle-row .name{font-weight:600;font-size:14px;}
  .vehicle-row .sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .vehicle-row .net{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:14px;
    font-variant-numeric:tabular-nums;
  }
  .vehicle-row .net.pos{color:var(--positive);}
  .vehicle-row .net.neg{color:var(--negative);}

  /* Log entries */
  .entry{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:9px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .entry .tag{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
  }
  .tag.earn{background:var(--positive);}
  .tag.exp{background:var(--negative);}
  .entry .info{flex:1;min-width:0;}
  .entry .info .cat{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:6px;}
  .entry .info .cat .rec-badge{
    font-size:9.5px;
    text-transform:uppercase;
    letter-spacing:.06em;
    background:var(--surface-2);
    color:var(--text-dim);
    border:1px solid var(--border);
    border-radius:5px;
    padding:1px 5px;
    font-weight:700;
  }
  .entry .info .meta{font-size:11.5px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry .amt{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:14px;
    font-variant-numeric:tabular-nums;
    flex-shrink:0;
  }
  .amt.earn{color:var(--positive);}
  .amt.exp{color:var(--negative);}
  .entry .del{
    background:none;border:none;color:var(--text-dim);
    font-size:16px;cursor:pointer;padding:4px 2px;flex-shrink:0;
  }
  .entry .del:active{color:var(--negative);}

  .empty-state{
    text-align:center;
    padding:50px 20px;
    color:var(--text-dim);
  }
  .empty-state .big{font-size:32px;margin-bottom:10px;}
  .empty-state p{font-size:13.5px;line-height:1.5;margin:0 0 16px;}
  .empty-state button{
    background:var(--accent);
    color:#fff;
    border:none;
    font-weight:700;
    font-size:13.5px;
    padding:11px 18px;
    border-radius:9px;
    cursor:pointer;
  }

  /* Vehicles tab */
  .veh-manage-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--border);
    border-radius:9px;padding:12px 14px;margin-bottom:8px;
  }
  .veh-manage-row .name{font-weight:600;font-size:14.5px;}
  .veh-manage-row .rm{background:none;border:none;color:var(--negative);font-size:13px;cursor:pointer;font-weight:600;}
  .add-vehicle-form{
    display:flex;gap:8px;margin-top:14px;
  }
  .add-vehicle-form input{
    flex:1;background:var(--surface);border:1px solid var(--border);
    color:var(--text);border-radius:9px;padding:11px 12px;font-size:14px;font-family:inherit;
  }
  .add-vehicle-form input::placeholder{color:var(--text-dim);}
  .add-vehicle-form button{
    background:var(--accent);color:#fff;border:none;font-weight:700;
    border-radius:9px;padding:0 16px;font-size:14px;cursor:pointer;
  }

  /* Recurring tab */
  .rec-row{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:9px;
    padding:12px 14px;
    margin-bottom:8px;
  }
  .rec-row .rec-top{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:4px;
  }
  .rec-row .rec-name{font-weight:600;font-size:14px;}
  .rec-row .rec-amt{
    font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;
    font-variant-numeric:tabular-nums;
  }
  .rec-row .rec-amt.earn{color:var(--positive);}
  .rec-row .rec-amt.exp{color:var(--negative);}
  .rec-row .rec-sub{font-size:11.5px;color:var(--text-dim);margin-bottom:10px;}
  .rec-row .rec-actions{display:flex;gap:8px;align-items:center;}
  .rec-toggle{
    display:flex;align-items:center;gap:7px;
    font-size:12px;color:var(--text-dim);font-weight:600;
    cursor:pointer;
  }
  .switch{
    width:34px;height:20px;border-radius:99px;background:var(--surface-2);
    border:1px solid var(--border);position:relative;flex-shrink:0;
  }
  .switch .knob{
    position:absolute;top:1px;left:1px;
    width:16px;height:16px;border-radius:50%;
    background:var(--text-dim);
    transition:transform .15s ease, background .15s ease;
  }
  .switch.on{background:var(--positive-dim);border-color:var(--positive);}
  .switch.on .knob{transform:translateX(14px);background:var(--positive);}
  .rec-row .rec-rm{
    margin-left:auto;
    background:none;border:none;color:var(--negative);
    font-size:12.5px;font-weight:600;cursor:pointer;
  }
  .rec-add-form{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    margin-top:16px;
  }
  .rec-add-form h3{margin:0 0 14px;font-size:13.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}

  /* Log entries */
  .filter-row{
    display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;
  }
  .filter-chip{
    flex-shrink:0;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text-dim);
    padding:7px 13px;
    border-radius:99px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

  /* Bottom nav */
  .bottom-nav{
    position:sticky;bottom:0;
    display:flex;
    border-top:1px solid var(--border);
    background:var(--bg);
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  }
  .bottom-nav button{
    flex:1;
    background:none;border:none;color:var(--text-dim);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 0;
    font-family:inherit;font-size:10px;font-weight:600;
    letter-spacing:.02em;
    cursor:pointer;
  }
  .bottom-nav button .ic{font-size:17px;}
  .bottom-nav button.active{color:var(--accent);}

  .fab{
    position:absolute;
    right:16px;
    bottom:82px;
    width:54px;height:54px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    border:none;
    font-size:26px;
    font-weight:700;
    box-shadow:0 6px 18px rgba(227,52,46,.35);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    z-index:20;
  }
  .fab:active{transform:scale(.95);}

  /* Modal */
  .modal-backdrop{
    position:fixed;inset:0;
    background:rgba(0,0,0,.6);
    display:flex;align-items:flex-end;
    z-index:100;
  }
  .modal-sheet{
    background:var(--surface);
    width:100%;
    max-width:480px;
    margin:0 auto;
    border-radius:16px 16px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:88vh;
    overflow-y:auto;
    border-top:1px solid var(--border);
  }
  .modal-sheet h2{margin:0 0 16px;font-size:17px;font-weight:700;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;
    color:var(--text-dim);margin-bottom:6px;font-weight:600;
  }
  .field input, .field select, .field textarea{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:9px;
    padding:12px;
    font-size:15px;
    font-family:inherit;
  }
  .field textarea{resize:none;min-height:44px;}
  .type-toggle{
    display:flex;gap:8px;margin-bottom:16px;
  }
  .type-toggle button{
    flex:1;
    padding:11px 0;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text-dim);
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
  }
  .type-toggle button.on.earn{background:var(--positive-dim);border-color:var(--positive);color:var(--positive);}
  .type-toggle button.on.exp{background:var(--negative-dim);border-color:var(--negative);color:var(--negative);}
  .modal-actions{
    display:flex;gap:10px;margin-top:6px;
  }
  .modal-actions button{
    flex:1;
    padding:13px 0;
    border-radius:9px;
    font-weight:700;
    font-size:14.5px;
    border:none;
    cursor:pointer;
  }
  .btn-cancel{background:var(--surface-2);color:var(--text);}
  .btn-save{background:var(--accent);color:#fff;}
  .amount-currency{
    position:relative;
  }
  .amount-currency::before{
    content:'£';
    position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--text-dim);font-size:15px;
  }
  .amount-currency input{padding-left:24px;}

  .checkbox-field{
    display:flex;align-items:center;gap:9px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:9px;
    padding:11px 12px;
    margin-bottom:14px;
  }
  .checkbox-field input{width:16px;height:16px;flex-shrink:0;accent-color:var(--accent);}
  .checkbox-field label{
    margin:0;text-transform:none;letter-spacing:0;font-weight:500;
    color:var(--text);font-size:13.5px;
  }
  .checkbox-hint{font-size:11.5px;color:var(--text-dim);margin-top:6px;line-height:1.4;}

  #loading{
    display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-dim);font-size:13px;
  }
</style>
</head>

  </div>
  <main id="content"></main>
  <button class="fab" id="fab">+</button>
  <nav class="bottom-nav">
    <button data-tab="dashboard" class="nav-btn active"><span class="ic">▤</span>Dashboard</button>

    <button data-tab="recurring" class="nav-btn"><span class="ic">↻</span>Recurring</button>

<div id="modal-root"></div>

<script>
const EXPENSE_CATS = ['Fuel','Maintenance','Insurance','Other'];
const EARNING_CATS = ['Rental income','Other'];

let state = {
  vehicles: [],
  entries: [],
  recurring: [],
  tab: 'dashboard',
  month: currentMonthKey(),
  filterVehicle: 'all'
};

function currentMonthKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function monthLabel(key){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1, 1);
  return d.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
}

function shiftMonth(delta){
  const [y,m] = state.month.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  state.month = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  render();
}

function daysInMonth(monthKey){
  const [y,m] = monthKey.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}

function fmt(n){
  const v = Math.abs(n).toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
  return (n<0?'-':'') + '£' + v;
}

function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

function loadData(){
  try{ state.vehicles = JSON.parse(localStorage.getItem('mch_vehicles') || '[]'); }
  catch(e){ state.vehicles = []; }
  try{ state.entries = JSON.parse(localStorage.getItem('mch_entries') || '[]'); }
  catch(e){ state.entries = []; }
  try{ state.recurring = JSON.parse(localStorage.getItem('mch_recurring') || '[]'); }
  catch(e){ state.recurring = []; }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
}

function saveVehicles(){
  try{ localStorage.setItem('mch_vehicles', JSON.stringify(state.vehicles)); }
  catch(e){ console.error('Save vehicles failed', e); alert('Could not save. Your browser may be blocking storage in private/incognito mode.'); }
}
function saveEntries(){
  try{ localStorage.setItem('mch_entries', JSON.stringify(state.entries)); }
  catch(e){ console.error('Save entries failed', e); alert('Could not save. Your browser may be blocking storage in private/incognito mode.'); }
}
function saveRecurring(){
  try{ localStorage.setItem('mch_recurring', JSON.stringify(state.recurring)); }
  catch(e){ console.error('Save recurring failed', e); alert('Could not save. Your browser may be blocking storage in private/incognito mode.'); }
}

function vehicleName(id){
  const v = state.vehicles.find(v=>v.id===id);
  return v ? v.name : 'Removed vehicle';
}

/* Generate virtual occurrences of active recurring templates that fall in a given month */
function recurringOccurrencesForMonth(month){
  return state.recurring
    .filter(r => r.active && r.startMonth <= month && !(r.skippedMonths||[]).includes(month))
    .map(r => {
      const day = Math.min(r.dayOfMonth, daysInMonth(month));
      return {
        id: 'rec-' + r.id + '-' + month,
        vehicleId: r.vehicleId,
        type: r.type,
        category: r.category,
        amount: r.amount,
        date: month + '-' + String(day).padStart(2,'0'),
        note: r.note,
        recurring: true,
        templateId: r.id
      };
    });
}

function entriesForMonth(month, vehicleId){
  const combined = state.entries.concat(recurringOccurrencesForMonth(month));
  return combined.filter(e=>{
    if(!e.date.startsWith(month)) return false;
    if(vehicleId && vehicleId!=='all' && e.vehicleId!==vehicleId) return false;
    return true;
  });
}

function totals(list){
  let earn=0, exp=0;
  list.forEach(e=> e.type==='earning' ? earn+=e.amount : exp+=e.amount);
  return { earn, exp, net: earn-exp };
}

/* ---------- RENDER ---------- */
function render(){
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===state.tab);
  });
  const titleMap = { dashboard:'Dashboard', log:'Log', vehicles:'Vehicles', recurring:'Recurring costs' };
  document.getElementById('page-title').textContent = titleMap[state.tab];
  const content = document.getElementById('content');
  if(state.tab==='dashboard') content.innerHTML = renderDashboard();
  if(state.tab==='log') content.innerHTML = renderLog();
  if(state.tab==='vehicles') content.innerHTML = renderVehicles();
  if(state.tab==='recurring') content.innerHTML = renderRecurring();
  attachContentListeners();
}

function renderDashboard(){
  if(state.vehicles.length===0){
    return emptyState('🚗','Add your first vehicle','Track earnings and expenses per car once you have added at least one to your fleet.','open-add-vehicle');
  }
  const monthEntries = entriesForMonth(state.month, 'all');
  const t = totals(monthEntries);
  const netClass = t.net>=0 ? 'pos' : 'neg';

  let vehicleRows = state.vehicles.map(v=>{
    const ve = entriesForMonth(state.month, v.id);
    const vt = totals(ve);
    const vcls = vt.net>=0?'pos':'neg';
    return `<div class="vehicle-row">
      <div>
        <div class="name">${escapeHtml(v.name)}</div>
        <div class="sub">${fmt(vt.earn)} in · ${fmt(vt.exp)} out</div>
      </div>
      <div class="net ${vcls}">${fmt(vt.net)}</div>
    </div>`;
  }).join('');

  return `
    <div class="month-switch">
      <button id="prev-month">‹</button>
      <div class="month-label">${monthLabel(state.month)}</div>
      <button id="next-month">›</button>
    </div>
    <div class="readout">
      <div class="net-label">Net this month</div>
      <div class="net-value ${netClass}">${fmt(t.net)}</div>
      <div class="readout-split">
        <div class="cell earn"><div class="lbl">Earnings</div><div class="val">${fmt(t.earn)}</div></div>
        <div class="cell exp"><div class="lbl">Expenses</div><div class="val">${fmt(t.exp)}</div></div>
      </div>
    </div>
    <div class="section-title">By vehicle</div>
    ${vehicleRows}
  `;
}

function renderLog(){
  if(state.vehicles.length===0){
    return emptyState('☰','Nothing to log yet','Add a vehicle first, then start logging jobs and costs against it.','open-add-vehicle');
  }
  const chips = [`<button class="filter-chip ${state.filterVehicle==='all'?'active':''}" data-veh="all">All</button>`]
    .concat(state.vehicles.map(v=>`<button class="filter-chip ${state.filterVehicle===v.id?'active':''}" data-veh="${v.id}">${escapeHtml(v.name)}</button>`))
    .join('');

  const list = entriesForMonth(state.month, state.filterVehicle)
    .sort((a,b)=> b.date.localeCompare(a.date));

  let rows;
  if(list.length===0){
    rows = `<div class="empty-state"><p>No entries for ${monthLabel(state.month)} yet. Tap + to add one.</p></div>`;
  } else {
    rows = list.map(e=>{
      const cls = e.type==='earning' ? 'earn' : 'exp';
      const sign = e.type==='earning' ? '+' : '−';
      const dateStr = new Date(e.date).toLocaleDateString('en-GB', {day:'numeric', month:'short'});
      const badge = e.recurring ? '<span class="rec-badge">↻ recurring</span>' : '';
      return `<div class="entry">
        <div class="tag ${cls}"></div>
        <div class="info">
          <div class="cat">${escapeHtml(e.category)}${badge}</div>
          <div class="meta">${dateStr} · ${escapeHtml(vehicleName(e.vehicleId))}${e.note ? ' · '+escapeHtml(e.note) : ''}</div>
        </div>
        <div class="amt ${cls}">${sign}${fmt(e.amount)}</div>
        <button class="del" data-del="${e.id}" data-recurring="${e.recurring?'1':'0'}" data-template="${e.templateId||''}" data-month="${state.month}">✕</button>
      </div>`;
    }).join('');
  }

  return `
    <div class="month-switch">
      <button id="prev-month">‹</button>
      <div class="month-label">${monthLabel(state.month)}</div>
      <button id="next-month">›</button>
    </div>
    <div class="filter-row">${chips}</div>
    ${rows}
  `;
}

function renderVehicles(){
  let rows = state.vehicles.length===0
    ? `<div class="empty-state" style="padding:30px 10px;"><p>No vehicles yet. Add one below.</p></div>`
    : state.vehicles.map(v=>`
      <div class="veh-manage-row">
        <div class="name">${escapeHtml(v.name)}</div>
        <button class="rm" data-rmveh="${v.id}">Remove</button>
      </div>`).join('');

  return `
    ${rows}
    <div class="add-vehicle-form">
      <input type="text" id="new-veh-name" placeholder="e.g. Ford Focus – AB12 CDE" maxlength="40">
      <button id="add-veh-btn">Add</button>
    </div>
  `;
}

function renderRecurring(){
  if(state.vehicles.length===0){
    return emptyState('↻','Add a vehicle first','Recurring costs like insurance need a vehicle to attach to.','open-add-vehicle');
  }
  const rows = state.recurring.length===0
    ? `<div class="empty-state" style="padding:30px 10px;"><p>No recurring costs set up yet. Add one below — insurance, finance payments, subscriptions, anything that repeats monthly.</p></div>`
    : state.recurring.map(r=>{
        const cls = r.type==='earning' ? 'earn' : 'exp';
        const sign = r.type==='earning' ? '+' : '−';
        return `<div class="rec-row">
          <div class="rec-top">
            <div class="rec-name">${escapeHtml(r.category)}</div>
            <div class="rec-amt ${cls}">${sign}${fmt(r.amount)}</div>
          </div>
          <div class="rec-sub">${escapeHtml(vehicleName(r.vehicleId))} · every month on day ${r.dayOfMonth} · from ${monthLabel(r.startMonth)}${r.note ? ' · '+escapeHtml(r.note) : ''}</div>
          <div class="rec-actions">
            <div class="rec-toggle" data-toggle="${r.id}">
              <div class="switch ${r.active?'on':''}"><div class="knob"></div></div>
              ${r.active ? 'Active' : 'Paused'}
            </div>
            <button class="rec-rm" data-rmrec="${r.id}">Delete</button>
          </div>
        </div>`;
      }).join('');

  const vehOptions = state.vehicles.map(v=>`<option value="${v.id}">${escapeHtml(v.name)}</option>`).join('');

  return `
    ${rows}
    <div class="rec-add-form">
      <h3>New recurring cost</h3>
      <div class="type-toggle">
        <button type="button" class="on exp" id="rec-type-exp">Expense</button>
        <button type="button" id="rec-type-earn">Earning</button>
      </div>
      <div class="field">
        <label>Vehicle</label>
        <select id="rec-vehicle">${vehOptions}</select>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="rec-category">${EXPENSE_CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Amount</label>
          <div class="amount-currency"><input type="number" id="rec-amount" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div>
        </div>
        <div class="field">
          <label>Day of month</label>
          <input type="number" id="rec-day" min="1" max="31" value="1">
        </div>
      </div>
      <div class="field">
        <label>Starting from</label>
        <input type="month" id="rec-start" value="${state.month}">
      </div>
      <div class="field">
        <label>Note (optional)</label>
        <input type="text" id="rec-note" placeholder="e.g. Admiral policy">
      </div>
      <div class="modal-actions" style="margin-top:2px;">
        <button class="btn-save" id="rec-save-btn" style="width:100%;">Add recurring cost</button>
      </div>
    </div>
  `;
}

function emptyState(icon, title, sub, actionId){
  return `<div class="empty-state">
    <div class="big">${icon}</div>
    <p><strong style="color:var(--text);display:block;margin-bottom:4px;font-size:15px;">${title}</strong>${sub}</p>
    <button id="${actionId}">Add a vehicle</button>
  </div>`;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- EVENTS ---------- */
function attachContentListeners(){
  const prev = document.getElementById('prev-month');
  const next = document.getElementById('next-month');
  if(prev) prev.onclick = ()=>shiftMonth(-1);
  if(next) next.onclick = ()=>shiftMonth(1);

  document.querySelectorAll('[data-veh]').forEach(chip=>{
    chip.onclick = ()=>{ state.filterVehicle = chip.dataset.veh; render(); };
  });

  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = async ()=>{
      if(btn.dataset.recurring==='1'){
        const ok = confirm('This is a recurring cost. OK will skip it for ' + monthLabel(btn.dataset.month) + ' only.\\n\\nTo stop it permanently, use the Recurring tab instead.');
        if(!ok) return;
        const tmpl = state.recurring.find(r=>r.id===btn.dataset.template);
        if(tmpl){
          tmpl.skippedMonths = tmpl.skippedMonths || [];
          tmpl.skippedMonths.push(btn.dataset.month);
          await saveRecurring();
        }
      } else {
        state.entries = state.entries.filter(e=>e.id!==btn.dataset.del);
        await saveEntries();
      }
      render();
    };
  });

  document.querySelectorAll('[data-rmveh]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.dataset.rmveh;
      const name = vehicleName(id);
      if(confirm(`Remove "${name}"? Its past entries will stay in your log but show as "Removed vehicle".`)){
        state.vehicles = state.vehicles.filter(v=>v.id!==id);
        await saveVehicles();
        render();
      }
    };
  });

  const addVehBtn = document.getElementById('add-veh-btn');
  if(addVehBtn){
    const doAdd = async ()=>{
      const input = document.getElementById('new-veh-name');
      const name = input.value.trim();
      if(!name) return;
      state.vehicles.push({ id: uid(), name });
      await saveVehicles();
      input.value = '';
      render();
    };
    addVehBtn.onclick = doAdd;
    document.getElementById('new-veh-name').addEventListener('keydown', e=>{
      if(e.key==='Enter') doAdd();
    });
  }

  const openAddVeh = document.getElementById('open-add-vehicle');
  if(openAddVeh) openAddVeh.onclick = ()=>{ state.tab='vehicles'; render(); };

  /* Recurring tab */
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick = async ()=>{
      const r = state.recurring.find(r=>r.id===el.dataset.toggle);
      if(r){ r.active = !r.active; await saveRecurring(); render(); }
    };
  });
  document.querySelectorAll('[data-rmrec]').forEach(btn=>{
    btn.onclick = async ()=>{
      if(confirm('Delete this recurring cost permanently? Past logged entries are not affected.')){
        state.recurring = state.recurring.filter(r=>r.id!==btn.dataset.rmrec);
        await saveRecurring();
        render();
      }
    };
  });

  const recTypeExp = document.getElementById('rec-type-exp');
  const recTypeEarn = document.getElementById('rec-type-earn');
  const recCat = document.getElementById('rec-category');
  if(recTypeExp && recTypeEarn){
    let recType = 'expense';
    recTypeExp.onclick = ()=>{
      recType='expense';
      recTypeExp.classList.add('on','exp'); recTypeEarn.classList.remove('on','earn');
      recCat.innerHTML = EXPENSE_CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
    };
    recTypeEarn.onclick = ()=>{
      recType='earning';
      recTypeEarn.classList.add('on','earn'); recTypeExp.classList.remove('on','exp');
      recCat.innerHTML = EARNING_CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
    };
    const recSaveBtn = document.getElementById('rec-save-btn');
    recSaveBtn.onclick = async ()=>{
      const amount = parseFloat(document.getElementById('rec-amount').value);
      const day = parseInt(document.getElementById('rec-day').value, 10);
      const startMonth = document.getElementById('rec-start').value;
      if(!amount || amount<=0){ alert('Enter an amount greater than 0.'); return; }
      if(!day || day<1 || day>31){ alert('Day of month must be between 1 and 31.'); return; }
      if(!startMonth){ alert('Pick a starting month.'); return; }
      state.recurring.push({
        id: uid(),
        vehicleId: document.getElementById('rec-vehicle').value,
        type: recType,
        category: recCat.value,
        amount: Math.round(amount*100)/100,
        dayOfMonth: day,
        startMonth,
        note: document.getElementById('rec-note').value.trim(),
        active: true,
        skippedMonths: []
      });
      await saveRecurring();
      render();
    };
  }
}

document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.onclick = ()=>{ state.tab = btn.dataset.tab; render(); };
});

document.getElementById('fab').onclick = openAddEntryModal;

/* ---------- MODAL: add entry ---------- */
function openAddEntryModal(){
  if(state.vehicles.length===0){
    state.tab = 'vehicles';
    render();
    return;
  }
  let type = 'earning';
  const root = document.getElementById('modal-root');
  const today = new Date().toISOString().slice(0,10);

  function catOptions(){
    return (type==='earning' ? EARNING_CATS : EXPENSE_CATS)
      .map(c=>`<option value="${c}">${c}</option>`).join('');
  }
  function vehOptions(){
    return state.vehicles.map(v=>`<option value="${v.id}">${escapeHtml(v.name)}</option>`).join('');
  }

  root.innerHTML = `
    <div class="modal-backdrop" id="backdrop">
      <div class="modal-sheet">
        <h2>Add entry</h2>
        <div class="type-toggle">
          <button type="button" class="on earn" id="type-earn">Earning</button>
          <button type="button" class="exp" id="type-exp">Expense</button>
        </div>
        <div class="field">
          <label>Vehicle</label>
          <select id="f-vehicle">${vehOptions()}</select>
        </div>
        <div class="field">
          <label>Category</label>
          <select id="f-category">${catOptions()}</select>
        </div>
        <div class="field">
          <label>Amount</label>
          <div class="amount-currency">
            <input type="number" id="f-amount" inputmode="decimal" step="0.01" min="0" placeholder="0.00">
          </div>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="f-date" value="${today}">
        </div>
        <div class="checkbox-field">
          <input type="checkbox" id="f-recurring">
          <label for="f-recurring">Repeat monthly from this date</label>
        </div>
        <div class="field">
          <label>Note (optional)</label>
          <textarea id="f-note" placeholder="e.g. 3-day weekend hire"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="modal-cancel">Cancel</button>
          <button class="btn-save" id="modal-save">Save entry</button>
        </div>
      </div>
    </div>
  `;

  const typeEarnBtn = document.getElementById('type-earn');
  const typeExpBtn = document.getElementById('type-exp');
  const catSelect = document.getElementById('f-category');

  typeEarnBtn.onclick = ()=>{
    type='earning';
    typeEarnBtn.classList.add('on'); typeExpBtn.classList.remove('on');
    catSelect.innerHTML = catOptions();
  };
  typeExpBtn.onclick = ()=>{
    type='expense';
    typeExpBtn.classList.add('on'); typeEarnBtn.classList.remove('on');
    catSelect.innerHTML = catOptions();
  };

  document.getElementById('backdrop').addEventListener('click', e=>{
    if(e.target.id==='backdrop') closeModal();
  });
  document.getElementById('modal-cancel').onclick = closeModal;

  document.getElementById('modal-save').onclick = async ()=>{
    const amountVal = parseFloat(document.getElementById('f-amount').value);
    const dateVal = document.getElementById('f-date').value;
    const isRecurring = document.getElementById('f-recurring').checked;
    if(!amountVal || amountVal<=0){ alert('Enter an amount greater than 0.'); return; }
    if(!dateVal){ alert('Pick a date.'); return; }

    if(isRecurring){
      const d = new Date(dateVal);
      state.recurring.push({
        id: uid(),
        vehicleId: document.getElementById('f-vehicle').value,
        type,
        category: document.getElementById('f-category').value,
        amount: Math.round(amountVal*100)/100,
        dayOfMonth: d.getDate(),
        startMonth: dateVal.slice(0,7),
        note: document.getElementById('f-note').value.trim(),
        active: true,
        skippedMonths: []
      });
      await saveRecurring();
    } else {
      const entry = {
        id: uid(),
        vehicleId: document.getElementById('f-vehicle').value,
        type,
        category: document.getElementById('f-category').value,
        amount: Math.round(amountVal*100)/100,
        date: dateVal,
        note: document.getElementById('f-note').value.trim()
      };
      state.entries.push(entry);
      await saveEntries();
    }
    state.month = dateVal.slice(0,7);
    closeModal();
    render();
  };
}

function closeModal(){
  document.getElementById('modal-root').innerHTML = '';
}

loadData();
</script>
</body>
</html>
